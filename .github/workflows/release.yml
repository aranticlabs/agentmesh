name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "agentmesh-v*"

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    if: startsWith(github.ref, 'refs/tags/')
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} -p agentmesh
      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#agentmesh-v}"
          version="${version#v}"
          name="agentmesh-v${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          binary="target/${{ matrix.target }}/release/agentmesh"
          suffix=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            binary="${binary}.exe"
            suffix=".exe"
          fi
          cp "$binary" "dist/${name}/agentmesh${suffix}"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentmesh-${{ matrix.target }}
          path: dist/agentmesh-v*-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  fuzz-smoke:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz run json_rpc_framing -- -runs=1000
        working-directory: fuzz
      - run: cargo +nightly fuzz run lockfile_parse -- -runs=1000
        working-directory: fuzz
      - run: cargo +nightly fuzz run frontmatter_parse -- -runs=1000
        working-directory: fuzz

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-artifacts
      - fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksum manifest
        run: |
          cd dist
          sha256sum agentmesh-v* > SHA256SUMS
      - uses: sigstore/cosign-installer@v3
      - name: Sign checksum manifest
        run: cosign sign-blob --yes --output-signature dist/SHA256SUMS.sig --bundle dist/SHA256SUMS.bundle dist/SHA256SUMS
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agentmesh-v*
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.bundle
